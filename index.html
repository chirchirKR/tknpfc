  <script>
const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"]
const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  function reqDate(param=null,stamp="true") {
    if (!param) return 0;
    
    let sd = new Date(param); // Set Date
    let tstamp = sd.getTime();
    if (stamp == "false") {
        let date = sd.getDate();
        let month = months[sd.getMonth()];
        let day = days[sd.getDay()];
        let year = sd.getFullYear();
       return `${day.slice(0,3)} ${date} ${month.slice(0,3)} ${year}`; 
    }
    else if (stamp == "tstamp") {
        return tstamp;
    }
    else {
        h = sd.getHours() - 3;
        m = sd.getMinutes();
        return h+':'+m;
    }
}
function showNew_(n=[]) {
    let edit = ['<h2 class="title-">NEWS</h2>'];
    let field = document.getElementById('newField');
    if (n.length < 1) return;
    if (n.length < 4) {
        n.forEach(function (item) {
            let url = item["photo"];
            //console.log(url)
            edit.push(`
            <div class="news-board" onclick="window.location.href = './news/index.html'">
            <img src="${(url.startsWith('/res/'))? '.'+url : url }"/><div>
            <h4>${item['title']}</h4>
            <p><span class="p-stadium">${item['stadium']}</span>~<span class="p-dated">${reqDate(item['date'], "false")} ${reqDate(item['date'],"0")}</span></p>
            </div></div>
            <hr class="sep-news">`);
        });
        edit.push(`<div class="more-button">
            <button onclick="window.location.href = './news/index.html'">MORE NEWS &gt;&gt;</button>
            </div>`);
        field.innerHTML = edit.join('\n');
        return;
    }
}
function showNextFixture(fixs=[]) {
    if (fixs.length < 1) {
        //alert();
        let edit = `  <section class="reminder">
        <p>× No Fixture For Now</p></section>`;
        let showNewFix = document.getElementById('showNewFix');
        showNewFix.innerHTML = edit;
        return;
    }
    
    let tstamp = [];
    fixs.forEach((item) => {
        if(Date.now() < new Date(item["date"]).getTime()) {
            let [hr, min] = item["time"].trim().split(':');
            hr = +hr * 3600000;
            min = +min * 60000;
            tstamp.push(reqDate(item["date"], "tstamp") + hr + min);
        }
    });
    //console.log(tstamp);
    tstamp = tstamp.sort((a,b) => {a+b});
    /*console.log(tstamp);
    console.log(Date.now());*/
    let fix_ = {};
    fixs.forEach((item) => {
        let [hr, min] = item["time"].trim().split(':');
        hr = +hr * 3600000;
        min = +min * 60000;
        if (tstamp[0] == reqDate(item["date"], "tstamp") + hr + min) {
            fix_ = item;
        }
    });
    let edit = `<div class="top-fix">
        <p class="next-fix">Next fixture</p><p class="all-fix" onclick="window.location.href = './fixtures/index.html'">All Fixtures &gt;&gt;</p>
      </div>
      <div class="mid-fix">
        <p class="dated-fix">${reqDate(fix_["date"], "false")}</p>
        <p class="league-fix">${fix_["league"]}</p>
      </div>
      <div class="bottom-fix">
        <img alt="" src="${fix_["homeLogo"]}"/>
        <div class="time-fix">${fix_["time"]}<br>VS</div>
        <img alt="" src="${fix_["awayLogo"]}"/>
      </div>
      <div class="team-name-fix">
        <p class="team-home-fix">${fix_["home"]}</p>
        <p class="team-away-fix">${fix_["away"]}</p>
      </div>`;
    let showNewFix = document.getElementById('showNewFix');
    showNewFix.innerHTML = edit;
}
function showLastFix(res=[]) {
    if (res.length < 1) return;
    
    let tstamp = [];
    results.forEach((item) => {
        let [hr, min] = item["time"].trim().split(':');
        hr = +hr * 3600000;
        min = +min * 60000;
        tstamp.push(reqDate(item["date"], "tstamp")+ hr + min);
    });
    tstamp = tstamp.sort((a,b) => {a+b});
    //console.log(tstamp);
    let res_ = {};
    results.forEach((item) => {
        let [hr, min] = item["time"].trim().split(':');
        hr = +hr * 3600000;
        min = +min * 60000;
        if (reqDate(item["date"], "tstamp") + hr + min === tstamp[tstamp.length - 1]) {
            res_ = item;
            //console.log(reqDate(item["date"], "tstamp") + hr + min);
        }
    });
    let edit = `<div class="top-fix">
        <p class="next-fix">Latest Result</p><p class="all-fix" onclick="window.location.href='./results/index.html'">All Results &gt;&gt;</p>
      </div>
      <div class="mid-fix">
        <p class="dated-fix">${reqDate(res_["date"], "false")}</p>
        <p class="league-fix">${res_["league"]}</p>
      </div>    
      <div class="team-name-fix">
        <p class="team-name-res">${res_["home"]}</p>
        <p class="team-score">${res_["homeScore"]}</p>
        <p class="team-score">${res_["awayScore"]}</p>
        <p class="team-name-res">${res_["away"]}</p>
      </div>`;
    
    let resField = document.getElementById('resField');
    resField.innerHTML = edit;
}

window.document.addEventListener('DOMContentLoaded', () => {
  showNew_(news);
  showNextFixture(fixtures);
  showLastFix(results);
});
</script>
